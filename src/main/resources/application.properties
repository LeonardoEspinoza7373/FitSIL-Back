# Otras configuraciones...
spring.config.import=optional:file:.env
jwt.secret=MI_SECRETO_AQUI


# URL del microservicio de recetas
microservicio.recetas.url=http://localhost:8082


# Configuración para MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/FitSIL
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialecto de Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Crear/actualizar las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update

# Mostrar consultas SQL en consola
spring.jpa.show-sql=true
